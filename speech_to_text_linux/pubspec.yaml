name: speech_to_text_linux
description: Linux implementation of the speech_to_text plugin using the Vosk
version: 0.0.1
homepage: https://github.com/csdcorp/speech_to_text

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

flutter:
  plugin:
    implements: speech_to_text
    platforms:
      linux:
        pluginClass: SpeechToTextLinuxPlugin
        dartPluginClass: SpeechToTextLinux

dependencies:
  flutter:
    sdk: flutter
  speech_to_text_platform_interface: ^2.4.0
  http: ^1.2.0
  archive: ^3.6.0
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
